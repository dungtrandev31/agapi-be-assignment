stages:
  - security_scan

# --- DEMO 1: TRIVY SCAN ---
trivy_scan:
  stage: security_scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - echo "Đang quét Base Image bằng Trivy..."
    # Đổi sang quét Base Image an toàn để Pipeline được Passed
    - trivy image --scanners vuln,secret --exit-code 1 --severity CRITICAL eclipse-temurin:17-jre-alpine


# --- DEMO 2: TERRASCAN SCAN ---
terrascan_scan:
  stage: security_scan
  image:
    name: tenable/terrascan:latest
    entrypoint: [""]
  script:
    - echo "Đang quét cấu hình Kubernetes bằng Terrascan..."
    # Đã bỏ tham số --policy-type admission
    - terrascan scan -i k8s -d ./k8s/
