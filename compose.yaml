version: '3.8'

services:
  # 1. MySQL 8.0 (Cơ sở dữ liệu chính)
  mysql:
    image: mysql:8.0
    container_name: flashsale-mysql
    environment:
      MYSQL_DATABASE: flashsale_db
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - flashsale_network
    restart: unless-stopped

  # 2. Redis (Lưu Cache, OTP, JWT Denylist, Tồn kho Flash Sale)
  redis:
    image: redis:7-alpine
    container_name: flashsale-redis
    ports:
      - "6379:6379"
    networks:
      - flashsale_network
    restart: unless-stopped

  # 3. Kafka (Message Queue - Chạy chế độ KRaft, no ZooKeeper)
  kafka:
    image: apache/kafka:3.9.0
    container_name: flashsale-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      # Quan trọng: Lắng nghe ở localhost:9092 để Spring Boot từ bên ngoài host có thể gửi/nhận message
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - CLUSTER_ID=flashsale-kafka-cluster-id
    networks:
      - flashsale_network
    restart: unless-stopped

  # 4. Kafka UI (Giao diện quản lý trực quan cho Kafka)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: flashsale-kafka-ui
    ports:
      - "8081:8081" # Truy cập UI tại trình duyệt: http://localhost:8081
    environment:
      - KAFKA_CLUSTERS_0_NAME=local-kafka
      # Kết nối tới container kafka thông qua mạng nội bộ của Docker
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - flashsale_network
    restart: unless-stopped

# Khai báo volume để giữ lại dữ liệu MySQL khi tắt/khởi động lại container
volumes:
  mysql_data:

# Khai báo bridge network để các container có thể nhìn thấy nhau thông qua container_name
networks:
  flashsale_network:
    driver: bridge